apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: gdb
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      containers:
        - name: gateway-service
          image: gdb/gateway-service:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: gdb-config
          env:
            - name: PORT
              value: "8000"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: gdb
spec:
  selector:
    app: gateway-service
  ports:
    - port: 8000
      targetPort: 8000
