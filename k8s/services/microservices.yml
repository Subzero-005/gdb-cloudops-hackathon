# Users Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: users-service
  namespace: gdb
spec:
  replicas: 2
  selector:
    matchLabels:
      app: users-service
  template:
    metadata:
      labels:
        app: users-service
    spec:
      containers:
        - name: users-service
          image: gdb/users-service:latest
          ports:
            - containerPort: 8003
          env:
            - name: PORT
              value: "8003"
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: gdb-config
                  key: USERS_DB_URL
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: gdb-secrets
                  key: DB_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gdb-secrets
                  key: DB_PASSWORD
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: users-service
  namespace: gdb
spec:
  selector:
    app: users-service
  ports:
    - port: 8003
      targetPort: 8003
---
