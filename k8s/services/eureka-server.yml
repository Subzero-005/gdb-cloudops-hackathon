apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka-server
  namespace: gdb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eureka-server
  template:
    metadata:
      labels:
        app: eureka-server
    spec:
      containers:
        - name: eureka-server
          image: gdb/eureka-server:latest
          ports:
            - containerPort: 8761
          env:
            - name: PORT
              value: "8761"
          readinessProbe:
            httpGet:
              path: /
              port: 8761
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8761
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: eureka-server
  namespace: gdb
spec:
  selector:
    app: eureka-server
  ports:
    - port: 8761
      targetPort: 8761
