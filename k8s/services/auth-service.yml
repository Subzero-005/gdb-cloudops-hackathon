apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: gdb
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: gdb/auth-service:latest
          ports:
            - containerPort: 8004
          env:
            - name: PORT
              value: "8004"
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: gdb-config
                  key: AUTH_DB_URL
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: gdb-secrets
                  key: DB_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gdb-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: gdb-secrets
                  key: JWT_SECRET
            - name: USERS_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: gdb-config
                  key: USERS_SERVICE_URL
          readinessProbe:
            httpGet:
              path: /api/v1/auth/health
              port: 8004
            initialDelaySeconds: 40
            periodSeconds: 10
            failureThreshold: 5
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: gdb
spec:
  selector:
    app: auth-service
  ports:
    - port: 8004
      targetPort: 8004
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-service-hpa
  namespace: gdb
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth-service
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
