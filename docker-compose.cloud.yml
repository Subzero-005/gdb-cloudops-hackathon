services:

  # ─── Database ─────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: gdb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Subzero_005}
      POSTGRES_DB: gdb_auth_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5432:5432"
    networks:
      - gdb-network
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Service Discovery ────────────────────────────────────────────────────────

  eureka-server:
    image: subzero005/gdb-eureka-server:latest
    container_name: gdb-eureka-server
    restart: unless-stopped
    ports:
      - "8761:8761"
    environment:
      PORT: 8761
      EUREKA_HOST: localhost
      JAVA_OPTS: "-Xms64m -Xmx128m -XX:+UseSerialGC"
    networks:
      - gdb-network
    deploy:
      resources:
        limits:
          memory: 196M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 0"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─── API Gateway ──────────────────────────────────────────────────────────────

  gateway-service:
    image: subzero005/gdb-gateway-service:latest
    container_name: gdb-gateway-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      EUREKA_URL: http://eureka-server:8761/eureka/
      AUTH_SERVICE_URL: http://auth-service:8004
      USERS_SERVICE_URL: http://users-service:8003
      ACCOUNT_SERVICE_URL: http://account-service:8001
      TRANSACTIONS_SERVICE_URL: http://transactions-service:8002
      JAVA_OPTS: "-Xms64m -Xmx128m -XX:+UseSerialGC"
    networks:
      - gdb-network
    depends_on:
      eureka-server:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 196M

  # ─── Auth Service ─────────────────────────────────────────────────────────────

  auth-service:
    image: subzero005/gdb-auth-service:latest
    container_name: gdb-auth-service
    restart: unless-stopped
    ports:
      - "8004:8004"
    environment:
      PORT: 8004
      DATABASE_URL: jdbc:postgresql://postgres:5432/gdb_auth_db
      DATABASE_USER: ${DB_USER:-postgres}
      DATABASE_PASSWORD: ${DB_PASSWORD:-Subzero_005}
      EUREKA_URL: http://eureka-server:8761/eureka/
      APP_SERVICES_USERS_URL: http://users-service:8003
      JAVA_OPTS: "-Xms64m -Xmx192m -XX:+UseSerialGC"
    networks:
      - gdb-network
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  # ─── Users Service ────────────────────────────────────────────────────────────

  users-service:
    image: subzero005/gdb-users-service:latest
    container_name: gdb-users-service
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      PORT: 8003
      DATABASE_URL: jdbc:postgresql://postgres:5432/gdb_users_db
      DATABASE_USER: ${DB_USER:-postgres}
      DATABASE_PASSWORD: ${DB_PASSWORD:-Subzero_005}
      EUREKA_URL: http://eureka-server:8761/eureka/
      APP_SERVICES_AUTH_URL: http://auth-service:8004
      JAVA_OPTS: "-Xms64m -Xmx192m -XX:+UseSerialGC"
    networks:
      - gdb-network
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  postgres-data:

networks:
  gdb-network:
    driver: bridge
