name: GDB CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: ${{ secrets.DOCKER_USERNAME }}/gdb

jobs:
  # ─── Build & Test Java Services ────────────────────────────────────────────

  build-java-services:
    name: Build Java Services
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - users-service
          - account-service
          - transactions-service
          - payment-gateway-service
          - company-service
          - aadhar-service
          - eureka-server
          - gateway-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build ${{ matrix.service }}
        run: |
          cd ${{ matrix.service }}
          mvn clean package -DskipTests --no-transfer-progress

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-jar
          path: ${{ matrix.service }}/target/*.jar
          retention-days: 1

  # ─── Build Frontend ─────────────────────────────────────────────────────────

  build-frontend:
    name: Build React Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build
        env:
          VITE_AUTH_SERVICE_URL: ${{ vars.VITE_AUTH_SERVICE_URL || 'http://localhost:8004' }}
          VITE_USERS_SERVICE_URL: ${{ vars.VITE_USERS_SERVICE_URL || 'http://localhost:8003' }}
          VITE_ACCOUNTS_SERVICE_URL: ${{ vars.VITE_ACCOUNTS_SERVICE_URL || 'http://localhost:8001' }}
          VITE_TRANSACTIONS_SERVICE_URL: ${{ vars.VITE_TRANSACTIONS_SERVICE_URL || 'http://localhost:8002' }}
          VITE_AADHAR_SERVICE_URL: ${{ vars.VITE_AADHAR_SERVICE_URL || 'http://localhost:8005' }}
          VITE_COMPANY_CRV_SERVICE_URL: ${{ vars.VITE_COMPANY_CRV_SERVICE_URL || 'http://localhost:8006' }}
          VITE_PAYMENT_GATEWAY_URL: ${{ vars.VITE_PAYMENT_GATEWAY_URL || 'http://localhost:8008' }}
          VITE_NOTIFICATION_SERVICE_URL: ${{ vars.VITE_NOTIFICATION_SERVICE_URL || 'http://localhost:8007' }}

  # ─── Build & Push Docker Images ─────────────────────────────────────────────

  build-docker-images:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [build-java-services, build-frontend]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')

    strategy:
      matrix:
        service:
          - name: auth-service
            context: auth-service
          - name: users-service
            context: users-service
          - name: account-service
            context: account-service
          - name: transactions-service
            context: transactions-service
          - name: payment-gateway-service
            context: payment-gateway-service
          - name: company-service
            context: company-service
          - name: aadhar-service
            context: aadhar-service
          - name: eureka-server
            context: eureka-server
          - name: gateway-service
            context: gateway-service
          - name: frontend
            context: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
