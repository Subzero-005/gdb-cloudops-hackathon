name: PR Validation

on:
  pull_request:
    branches: [main, dev]

jobs:
  validate:
    name: Validate PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build all Java services
        run: |
          for svc in auth-service users-service account-service transactions-service \
                     payment-gateway-service company-service aadhar-service \
                     eureka-server gateway-service; do
            echo "Building $svc..."
            cd $svc
            mvn clean package -DskipTests --no-transfer-progress -q
            cd ..
          done

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build
